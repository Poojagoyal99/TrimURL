version: '3.9'

services:

  # Redis — used as cache (DB 1) and Celery broker (DB 2)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django backend API
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy

  # Celery worker — processes background tasks
  celery_worker:
    build: ./backend
    command: python -m celery -A core worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy

  # Celery beat — periodic task scheduler
  celery_beat:
    build: ./backend
    command: python -m celery -A core beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy

  # React frontend served via Nginx
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
